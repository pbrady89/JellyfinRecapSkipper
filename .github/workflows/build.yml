name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build JellyfinRecapSkipper/JellyfinRecapSkipper.csproj --configuration Release

      - name: Create zip
        run: |
          cd JellyfinRecapSkipper/bin/Release/net8.0
          zip -j ../../../../jellyfin-recap-skipper.zip JellyfinRecapSkipper.dll

      - name: Get MD5 checksum
        id: checksum
        run: echo "md5=$(md5sum jellyfin-recap-skipper.zip | awk '{print $1}' | tr '[:lower:]' '[:upper:]')" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}.0" >> $GITHUB_OUTPUT

      - name: Update manifest
        env:
          MD5: ${{ steps.checksum.outputs.md5 }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 -c "
          import json, os
          md5 = os.environ['MD5']
          version = os.environ['VERSION']
          ref = os.environ['GITHUB_REF_NAME']
          manifest = [{
            'category': 'General',
            'guid': 'a8b6e1c2-d4f3-4e5a-9c7b-2f8d6e1a3b5c',
            'name': 'Recap Skipper',
            'description': 'Detects and skips previously on recaps in TV series using frame comparison.',
            'owner': 'pbrady89',
            'overview': 'Reads recap timestamps generated by the Recap Skipper Python tool and surfaces a Skip Recap button in Jellyfin.',
            'versions': [{
              'version': version,
              'changelog': 'See GitHub releases for changelog.',
              'targetAbi': '10.10.0.0',
              'sourceUrl': f'https://github.com/pbrady89/JellyfinRecapSkipper/releases/download/{ref}/jellyfin-recap-skipper.zip',
              'checksum': md5,
              'timestamp': '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
            }]
          }]
          with open('manifest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          print('Manifest updated with checksum:', md5)
          "

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifest.json
          git commit -m "Update manifest for ${GITHUB_REF_NAME}"
          git push origin HEAD:master

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: jellyfin-recap-skipper.zip
