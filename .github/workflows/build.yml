name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build JellyfinRecapSkipper/JellyfinRecapSkipper.csproj --configuration Release

      - name: Create zip
        run: |
          cd JellyfinRecapSkipper/bin/Release/net8.0
          zip -j ../../../../jellyfin-recap-skipper.zip JellyfinRecapSkipper.dll

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: jellyfin-recap-skipper.zip
